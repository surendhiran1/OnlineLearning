version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: edunova_mysql
    environment:
      MYSQL_DATABASE: x
      MYSQL_ROOT_PASSWORD: 9986132559
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    container_name: edunova_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  mysql_data:
  mongodb_data:
